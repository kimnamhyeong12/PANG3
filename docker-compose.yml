version: '3.8'

services:
  #  1. 공간 데이터베이스 (PostGIS 16)
  db:
    image: postgis/postgis:16-3.4
    container_name: sahagu-db
    restart: always
    environment:
      - POSTGRES_USER=sahagu_admin
      - POSTGRES_DB=sahagu_fieldwork
      - POSTGRES_PASSWORD=sahagu_local_pw #가짜 DB 비밀번호
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  #  2. 백엔드 서버 (자바 17)
  backend:
    image: eclipse-temurin:17-jdk-alpine
    container_name: sahagu-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # AWS 금고(SSM)에서 데이터를 가져오도록 설정
      - SPRING_CONFIG_IMPORT=aws-parameterstore:/sahagu/
      - AWS_REGION=ap-northeast-2
      # DB 접속 정보 (Spring Boot가 이 정보를 바탕으로 DB에 연결함)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sahagu_fieldwork
      - SPRING_DATASOURCE_USERNAME=sahagu_admin
      # 금고에 저장한 '/sahagu/db/password'를 자동으로 대입
      - SPRING_DATASOURCE_PASSWORD=$${db.password}